name: Spellcheck
on:
  - pull_request
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check spelling
        uses: crate-ci/typos@27ae304665df6c1ed33363f179c1656fc03de0f1 # master
        # typos is a Source code spell checker
        # https://github.com/crate-ci/typos
