name: Spellcheck
on:
  - pull_request
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Check spelling
        uses: crate-ci/typos@27ae304665df6c1ed33363f179c1656fc03de0f1 # master
        # typos is a Source code spell checker
        # https://github.com/crate-ci/typos
