name: binary release

on:
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    # "released" events are emitted either when directly be released or be edited from pre-released.
    types: [prereleased, released]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.arch }} on ${{ matrix.os }} with ${{ matrix.gcc }}
    env:
      NAME: gitignore-in
      ARCH: ${{ matrix.arch }}
      OS: ${{ matrix.os }}
      PACKAGE: ${{ matrix.package }}
      GCC: ${{ matrix.gcc }}
      CFLAGS: ${{ matrix.cflags }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - arch: x86_64-unknown-linux-musl
            os: ubuntu-latest
            package: musl-tools
          - arch: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            package: gcc-aarch64-linux-gnu
            gcc: aarch64-linux-gnu-gcc
          - arch: aarch64-unknown-linux-musl
            # Use musl 1.1 instead of 1.2
            os: ubuntu-22.04
            package: gcc-aarch64-linux-gnu musl-tools
            gcc: aarch64-linux-gnu-gcc
            cflags: -U_FORTIFY_SOURCE
          - arch: armv7-unknown-linux-gnueabihf
            os: ubuntu-latest
            package: gcc-arm-linux-gnueabihf
            gcc: arm-linux-gnueabihf-gcc
          - arch: armv7-unknown-linux-musleabihf
            # Use musl 1.1 instead of 1.2
            os: ubuntu-22.04
            package: gcc-arm-linux-gnueabihf musl-tools
            gcc: arm-linux-gnueabihf-gcc
            cflags: -U_FORTIFY_SOURCE
          - arch: arm-unknown-linux-gnueabihf
            os: ubuntu-latest
            package: gcc-arm-linux-gnueabihf
            gcc: arm-linux-gnueabihf-gcc
          # Drop support for arm-unknown-linux-musleabihf
          # - arch: arm-unknown-linux-musleabihf
          #   os: ubuntu-latest
          #   package: gcc-arm-linux-gnueabihf musl-tools
          #   cflags: -U_FORTIFY_SOURCE
          #   gcc: arm-linux-gnueabihf-gcc
          # unresolved import `std::os::unix`
          # `std::os::unix` is not available on Windows. I think there is a simple solution. I will not release Windows version until it is ready.
          # - arch: x86_64-pc-windows-gnu
          #   os: ubuntu-latest
          #   package: gcc-mingw-w64-x86-64
          # Apple currently ships security updates for macOS Sonoma 14, Sequoia 15,
          # and Tahoe 26, so keep the next Homebrew-distributed binaries compatible
          # with the oldest still-supported major release:
          # https://support.apple.com/en-us/100100
          #
          # The GitHub-hosted runner labels below are stable and explicit; avoid
          # macos-latest for release builds:
          # https://docs.github.com/en/actions/reference/runners/github-hosted-runners
          - arch: x86_64-apple-darwin
            os: macos-15-intel
            deployment_target: "14.0"
          - arch: aarch64-apple-darwin
            os: macos-15
            deployment_target: "14.0"

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Verify release version
        if: github.event_name == 'release' || startsWith(github.head_ref, 'release/')
        env:
          RELEASE_REF: ${{ github.event_name == 'release' && github.event.release.tag_name || github.head_ref }}
        run: ./scripts/check-release-version.sh "${RELEASE_REF}"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.arch }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.os }}-${{ matrix.arch }}
      - name: Build target
        run: |
          if [[ "${OS}" =~ ^.*ubuntu.*$ ]]; then
            rustup target add "${ARCH}"
            if [ -n "${PACKAGE:-}" ]; then
              # shellcheck disable=SC2086
              sudo apt-get update && sudo apt-get install -y ${PACKAGE}
            fi
            TARGET="${ARCH}" CFLAGS="${CFLAGS}" CC="${GCC}" cargo build --release --verbose --target "${ARCH}"
          elif [[ "${OS}" =~ ^.*macos.*$ ]]; then
            MACOSX_DEPLOYMENT_TARGET="${{ matrix.deployment_target }}" cargo build --release --verbose --target "${ARCH}"
          fi

      - name: Compress
        run: |
          mkdir -p ./artifacts
          if [[ "${ARCH}" =~ ^.*windows.*$ ]]; then
              EXEC="${NAME}.exe"
          else
              EXEC="${NAME}"
          fi
          if [[ $GITHUB_REF_TYPE =~ ^tag$ ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${GITHUB_SHA}"
          fi
          mv "./target/${ARCH}/release/${EXEC}" "./${EXEC}"
          mv "./${EXEC}" ./gitignore.in
          tar -czf "./artifacts/${NAME}-${ARCH}-${TAG}.tar.gz" ./gitignore.in

      - if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'pull_request' && startsWith(github.head_ref, 'release/'))
        name: Archive artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: result-${{ matrix.arch }}
          path: |
            ./artifacts

  deploy:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: result-*
          merge-multiple: true
          path: ./artifacts
      - name: List
        run: find ./artifacts
      - name: Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: ./artifacts/*.tar.gz
          fail_on_unmatched_files: true
