name: prepare downstream release updates

on:
  release:
    types: [released]
  workflow_dispatch:
    inputs:
      version:
        description: Released gitignore.in version tag (for example, v0.2.0)
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repository:
          - gitignore-in/homebrew-gitignore-in
          - gitignore-in/gh-action
    steps:
      - name: Require downstream release token
        env:
          DOWNSTREAM_RELEASE_PAT: ${{ secrets.DOWNSTREAM_RELEASE_PAT }}
        run: |
          if [ -z "${DOWNSTREAM_RELEASE_PAT}" ]; then
            echo "DOWNSTREAM_RELEASE_PAT secret is required to dispatch downstream release workflows." >&2
            exit 1
          fi

      - name: Resolve released version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          RELEASE_VERSION: ${{ github.event.release.tag_name }}
        run: |
          version="${INPUT_VERSION:-$RELEASE_VERSION}"
          if [ -z "${version}" ]; then
            echo "version input is required" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Dispatch downstream preparation
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ secrets.DOWNSTREAM_RELEASE_PAT }}
          repository: ${{ matrix.repository }}
          event-type: gitignore-in-release-published
          client-payload: >-
            {"version":"${{ steps.version.outputs.version }}","source_repository":"${{ github.repository }}"}
